<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sito Schwarzenberger GRAPHIC DESIGN Sitoform</title>
  <!-- Load the local Tailwind CSS file -->
  <link href="/css/output.css" rel="stylesheet">
  <!-- Inter Font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #343333;
      color: white;
      font-family: 'Inter', sans-serif;
    }
    header {
      z-index: 10;
      position: relative;
    }
    section.artwork-section {
      background-color: #343333;
      max-width: 1000px;
      min-height: 200px;
      min-width: 250px;
      margin: 0 auto;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      overflow: hidden;
      /* border: 1px solid orange; /* Remove after testing */
    }
    .artwork-display {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px; /* Reduced padding */
      box-sizing: border-box;
      z-index: 5;
      /* border: 1px solid purple; /* Remove after testing */
    }
    .artwork-display img {
      max-width: 100%;
      object-fit: contain;
      object-position: top;
      opacity: 0; /* Ensure it starts invisible */
    }
    /* Fade-in animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    #artwork-image {
      opacity: 0; /* Start invisible */
      animation: fadeIn 0.5s ease-in forwards; /* Apply the animation */
    }
    /* Spinner Styles */
    .spinner {
      display: none;
      width: 40px;
      height: 40px;
      border: 4px solid #ffffff33;
      border-top: 4px solid #009FE3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .blue-line {
      height: 3px;
      background-color: #009FE3;
      width: 1000px;
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .vertical-line {
      width: 2px;
      height: 26px;
      background-color: white;
    }
    .short-vertical-line {
      width: 2px;
      height: 36px;
      background-color: white;
    }
    .metadata-section {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(calc(-50% - 324px));
      max-width: 1000px;
      display: flex;
      align-items: flex-start;
      gap: 60px;
      z-index: 10;
      /* border: 1px solid green; /* Remove after testing */
    }
    .metadata-item {
      position: relative;
      display: flex;
      align-items: center;
      margin-top: 10px;
      margin-left: -18px;
    }
    .metadata-item.text-left {
      width: 50px;
      min-width: 50px;
      flex-shrink: 0;
      text-align: left;
      margin-left: 0px; /* Align to the left edge */
    }
    .metadata-item.project-item {
      margin-left: -10px;
      width: 250px;
      flex-shrink: 0;
    }
    .metadata-item.year-item {
      position: absolute;
      left: 415px;
      width: 250px;
    }
    .metadata-item.type-item {
      position: absolute;
      left: 690px;
      width: 250px;
    }
    .metadata-group {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      height: 36px;
      margin-left: -40px;
      align-content: flex-start;
    }
    .metadata-group .text-wrapper {
      margin-left: 20px;
      width: 250px;
      min-height: 36px;
      display: flex;
      flex-wrap: wrap;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      align-content: flex-start;
      margin-top: 0px;
    }
    .number-align {
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* Changed to left-align numbers */
      height: 36px;
      justify-content: space-between;
      margin-left: 0px; /* Align with the left edge */
      font-family: 'Courier New', monospace;
    }
    /* Description Wrapper */
    .description-wrapper {
      margin-left: -14px;
      width: 820px;
      margin-top: 60px;
      /* border: 1px solid red; /* Remove after testing */
    }
    /* Arrow Container */
    .arrow-container {
      position: absolute;
      bottom: 12px; /* Align vertically with the blue-line */
      left: 50%;
      transform: translateX(-50%);
      width: 1000px; /* Match blue-line width */
      height: 40px; /* Match arrow-wrapper height */
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }
    .arrow-wrapper {
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 15; /* Ensure it’s above other elements */
    }
    .arrow {
      height: 10px;
      width: auto;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .arrow-left {
      transform: rotate(180deg);
      margin-right: 30px;
    }
    .arrow-right {
      transform: rotate(0deg);
      margin-left: 30px;
    }
    .arrow.disabled {
      opacity: 0.3;
      cursor: default;
    }
    .arrow-wrapper:not(.disabled):hover .arrow-left {
      transform: rotate(180deg) scale(1.2);
    }
    .arrow-wrapper:not(.disabled):hover .arrow-right {
      transform: rotate(0deg) scale(1.2);
    }
    /* Hover Areas */
    .hover-area {
      position: fixed;
      top: 0;
      height: 100%;
      width: 45%; /* Reduced to create a gap in the center */
      z-index: 5;
      cursor: pointer;
    }
    .hover-left {
      left: 0;
    }
    .hover-right {
      right: 0;
    }
    /* Font Group CSS Classes */
    .owner {
      font-size: 14px;
      font-weight: 700;
      color: #575756;
      line-height: 1;
    }
    .ownersub1 {
      font-size: 14px;
      font-weight: 300;
      color: #575756;
      line-height: 1;
    }
    .ownersub2 {
      font-size: 14px;
      font-weight: 200;
      color: #575756;
      line-height: 1;
    }
    .headerlinks {
      font-size: 14px;
      font-weight: 200;
      color: white;
    }
    .artlink {
      font-size: 14px;
      font-weight: 700;
      color: white;
    }
    .category {
      font-size: 12px;
      font-weight: 100;
      line-height: 1;
      margin-bottom: 2px;
    }
    .projectdata {
      font-size: 16px;
      font-weight: 700;
      line-height: 2;
      color: white;
    }
    .description {
      font-size: 14px;
      font-weight: 200;
      line-height: 1.5;
      max-width: 433px;
      color: white;
    }
    #description {
      column-count: 2;
      column-width: 400px;
      column-gap: 20px;
      column-fill: auto;
      height: auto;
      max-height: 108px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 200;
      color: white;
      white-space: pre-wrap;
      /* border: 1px solid yellow; /* Remove after testing */
    }
    #total-artworks {
      font-size: 14px;
      font-weight: 100;
      line-height: 1;
      color: white;
      margin-top: -1px;
    }
    #artwork-number {
      margin-top: 1px;
    }
    /* Header-specific styles */
    .header-content {
      position: relative;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      min-height: 133px;
    }
    /* Stabilize metadata section */
    .w-full.py-4 {
      position: relative;
      min-height: 200px;
      padding-bottom: 50px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .blue-line {
        width: 90%;
        bottom: -3px;
        z-index: 100;
      }
      /* Header adjustments for mobile */
      .header-content {
        padding: 10px;
        min-height: auto; /* Allow header to shrink */
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: relative;
      }
      .logo {
        width: 150px;
        height: auto;
        position: static; /* Remove absolute positioning */
        margin-bottom: 10px;
      }
      .header-text {
        position: static !important; /* Override desktop positioning */
        margin-bottom: 10px;
      }
      .nav-links {
        position: static !important; /* Override desktop positioning */
        flex-direction: column;
        gap: 5px;
        margin-bottom: 10px;
      }
      .art-link {
        position: static !important; /* Override desktop positioning */
        align-self: flex-end;
      }
      .metadata-section {
        position: static;
        max-width: 90%;
        margin-left: auto;
        margin-right: auto;
        flex-direction: column;
        padding: 10px 0;
        gap: 15px; /* Reduced gap for mobile */
      }
      .metadata-item {
        width: 100% !important;
        max-width: none !important;
        margin-bottom: 5px;
        margin-left: 0; /* Reset negative margin */
        position: static;
      }
      .metadata-item.text-left {
        margin-left: 0;
      }
      .metadata-group {
        margin-left: 0; /* Reset negative margin */
        height: auto; /* Allow natural height */
      }
      .metadata-group .text-wrapper {
        margin-left: 10px; /* Reduced margin */
        width: 100%; /* Full width for mobile */
      }
      .number-align {
        align-items: flex-start;
        margin-left: 0;
        height: auto; /* Allow natural height */
      }
      .description-wrapper {
        margin-left: 0;
        width: 100%;
        margin-top: 20px; /* Reduced for mobile */
        padding: 0 10px;
      }
      #description {
        column-count: 1;
        max-width: 100%;
        height: auto;
        max-height: 150px; /* Slightly taller for mobile readability */
        font-size: 14px; /* Larger for readability */
        line-height: 1.6; /* Better spacing */
      }
      section.artwork-section {
        max-width: 90%;
        min-height: 150px;
        min-width: 200px;
        margin: 10px auto 0;
        overflow: hidden;
      }
      .artwork-display {
        width: 100%;
        height: 100%;
        padding: 5px;
        align-items: flex-start;
      }
      .artwork-display img {
        max-width: 100%;
        object-position: top;
      }
      .arrow-container {
        bottom: -3px;
        width: 90%;
        height: 40px; /* Slightly larger for better touch area */
      }
      .arrow-wrapper {
        width: 40px; /* Larger for better touch area */
        height: 40px;
      }
      .arrow {
        height: 14px; /* Slightly larger for visibility */
      }
      .arrow-left {
        margin-right: 20px; /* Adjusted for mobile */
      }
      .arrow-right {
        margin-left: 20px; /* Adjusted for mobile */
      }
      .arrow-wrapper:not(.disabled):hover .arrow-left {
        transform: rotate(180deg) scale(1.2);
      }
      .arrow-wrapper:not(.disabled):hover .arrow-right {
        transform: rotate(0deg) scale(1.2);
      }
      .owner, .ownersub1, .ownersub2, .headerlinks, .artlink {
        font-size: 14px; /* Slightly larger for readability */
        line-height: 1.2; /* Better spacing */
      }
      .projectdata {
        font-size: 14px; /* Slightly smaller but readable */
        line-height: 1.5;
      }
      .description {
        font-size: 14px;
        line-height: 1.6;
      }
      .category {
        font-size: 12px; /* Slightly larger */
        line-height: 1.2;
      }
      .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid #ffffff33;
        border-top: 3px solid #009FE3;
      }
      #total-artworks {
        font-size: 14px;
      }
      .w-full.py-4 {
        min-height: 200px;
        padding-bottom: 40px;
        padding-top: 10px; /* Reduced for mobile */
      }
    }
  </style>
</head>
<body>
  <!-- Hover Areas for Arrows -->
  <div class="hover-area hover-left" id="hover-left"></div>
  <div class="hover-area hover-right" id="hover-right"></div>

  <!-- Header Section -->
  <header class="w-full h-[133px] bg-[#343333] overflow-visible relative">
    <div class="header-content max-w-[1000px] mx-auto relative">
      <div class="logo absolute left-[40px] top-[18px]">
        <img src="https://sitoform.com/logo/sito+RDA_logo01" alt="Logo" class="w-[210px] h-[75px]" />
      </div>
      <div class="header-text absolute left-[278px] top-[15px] leading-tight">
        <p class="owner">SITO SCHWARZENBERGER</p>
        <p class="ownersub1">RADIKAL DESIGN</p>
        <p class="ownersub2">ALLIANCE</p>
      </div>
      <nav class="nav-links absolute left-[278px] top-[76px] flex space-x-2">
        <a href="https://sitoform.com/about" class="headerlinks hover:underline">BIOGRAPHY</a>
        <a href="https://sitoform.com/about" class="headerlinks hover:underline">CONTACT</a>
        <a href="https://sitoform.com/visuals" class="headerlinks hover:underline">VISUALS</a>
      </nav>
      <a href="https://sitoschwarzenberger.art" class="art-link absolute right-[50px] top-[15px] artlink hover:underline">> ART</a>
      <div class="blue-line"></div>
    </div>
  </header>

  <!-- Metadata Section -->
  <section class="w-full py-4 bg-[#343333]">
    <div class="max-w-[1000px] mx-auto">
      <!-- Metadata Row -->
      <div class="metadata-section flex items-start">
        <!-- Total and Current Artwork Numbers -->
        <div class="metadata-item text-left">
          <div class="number-align">
            <p id="total-artworks" class="projectdata">0</p>
            <p id="artwork-number" class="projectdata"></p>
          </div>
        </div>
        <!-- Project -->
        <div class="metadata-item project-item">
          <div class="metadata-group">
            <div class="short-vertical-line"></div>
            <div class="text-wrapper">
              <p class="category">PROJECT</p>
              <p id="artwork-title" class="projectdata"></p>
            </div>
          </div>
        </div>
        <!-- Year -->
        <div class="metadata-item year-item">
          <div class="metadata-group">
            <div class="short-vertical-line"></div>
            <div class="text-wrapper">
              <p class="category">YEAR</p>
              <p id="artwork-year" class="projectdata"></p>
            </div>
          </div>
        </div>
        <!-- Type -->
        <div class="metadata-item type-item">
          <div class="metadata-group">
            <div class="short-vertical-line"></div>
            <div class="text-wrapper">
              <p class="category">TYPE</p>
              <p id="artwork-type" class="projectdata"></p>
            </div>
          </div>
        </div>
      </div>
      <!-- Description -->
      <div class="description-wrapper">
        <div id="description"></div>
      </div>
      <!-- New Arrows Below Description -->
      <div class="arrow-container">
        <div class="arrow-wrapper" id="arrow-left-wrapper">
          <img src="/images/nextArrow_01.svg" alt="Previous Arrow" class="arrow arrow-left" id="arrow-left">
        </div>
        <div class="arrow-wrapper" id="arrow-right-wrapper">
          <img src="/images/nextArrow_01.svg" alt="Next Arrow" class="arrow arrow-right" id="arrow-right">
        </div>
      </div>
    </div>
  </section>

  <!-- Artwork Section -->
  <section class="artwork-section">
    <div class="max-w-[1000px] mx-auto text-center">
      <div id="artwork-display" class="artwork-display">
        <div class="spinner" id="loading-spinner"></div>
        <img src="" alt="Artwork" id="artwork-image" />
      </div>
    </div>
  </section>

  <!-- JavaScript for Swipe Functionality -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    let artworks = [];
    let currentIndex = 0;
    let typingTimeout = null;

    // DOM elements
    const totalArtworks = document.getElementById('total-artworks');
    const artworkNumber = document.getElementById('artwork-number');
    const artworkTitle = document.getElementById('artwork-title');
    const artworkYear = document.getElementById('artwork-year');
    const artworkType = document.getElementById('artwork-type');
    const description = document.getElementById('description');
    const artworkDisplay = document.getElementById('artwork-display');
    const artworkImage = document.getElementById('artwork-image');
    const loadingSpinner = document.getElementById('loading-spinner');
    const arrowLeft = document.getElementById('arrow-left');
    const arrowRight = document.getElementById('arrow-right');
    const arrowLeftWrapper = document.getElementById('arrow-left-wrapper');
    const arrowRightWrapper = document.getElementById('arrow-right-wrapper');
    const hoverLeft = document.getElementById('hover-left');
    const hoverRight = document.getElementById('hover-right');
    const artworkSection = document.querySelector('.artwork-section');
    const metadataSection = document.querySelector('.w-full.py-4');

    // Supabase client (not used directly since we use API)
    const supabaseUrl = 'https://ydfkrwjafnuvdvezpkcp.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkZmtyd2phZm51dmR2ZXpwa2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUxNzA0MTUsImV4cCI6MjA2MDc0NjQxNX0.kHzI8KRGFBRrLpFVvJfK2JP_P2a9nRJzDBm5h235eJw';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Function to adjust artwork section height and scale image
    function adjustArtworkHeightAndScale() {
      // Calculate available height
      const headerHeight = document.querySelector('header').offsetHeight;
      const metadataHeight = metadataSection.offsetHeight;
      const viewportHeight = window.innerHeight;
      const paddingTotal = parseInt(getComputedStyle(artworkDisplay).paddingTop) + parseInt(getComputedStyle(artworkDisplay).paddingBottom);
      const availableHeight = viewportHeight - headerHeight - metadataHeight - 20; // 20px buffer
      const minHeight = window.innerWidth <= 768 ? 150 : 200;

      // Set artwork section height
      const sectionHeight = Math.max(minHeight, availableHeight);
      artworkSection.style.height = `${sectionHeight}px`;

      // Scale image to fit
      if (artworkImage.naturalWidth && artworkImage.naturalHeight) {
        const containerWidth = artworkSection.offsetWidth - (parseInt(getComputedStyle(artworkDisplay).paddingLeft) + parseInt(getComputedStyle(artworkDisplay).paddingRight));
        const containerHeight = sectionHeight - paddingTotal;

        // Scale based on width
        const widthScale = containerWidth / artworkImage.naturalWidth;
        let scaledHeight = artworkImage.naturalHeight * widthScale;

        // If scaled height exceeds container height, scale down further
        if (scaledHeight > containerHeight) {
          const heightScale = containerHeight / scaledHeight;
          scaledHeight = containerHeight;
          const scaledWidth = artworkImage.naturalWidth * widthScale * heightScale;
          artworkImage.style.maxWidth = `${scaledWidth}px`;
          artworkImage.style.maxHeight = `${scaledHeight}px`;
        } else {
          artworkImage.style.maxWidth = `${containerWidth}px`;
          artworkImage.style.maxHeight = 'none';
        }
      }

      logSectionHeight();
    }

    // Debug section and image dimensions
    function logSectionHeight() {
      const containerHeight = artworkSection.offsetHeight;
      const displayHeight = artworkDisplay.offsetHeight;
      const imageHeight = artworkImage.clientHeight;
      const naturalHeight = artworkImage.naturalHeight;
      const scale = artworkImage.clientWidth / artworkImage.naturalWidth || 0;
      const expectedHeight = naturalHeight * scale;
      const bottomVisible = imageHeight + artworkImage.offsetTop <= containerHeight;
      const topVisible = artworkImage.offsetTop >= 0;

      console.log('Viewport height:', window.innerHeight);
      console.log('Header height:', document.querySelector('header').offsetHeight);
      console.log('Metadata height:', metadataSection.offsetHeight);
      console.log('Artwork section dimensions:', artworkSection.offsetWidth, 'x', containerHeight);
      console.log('Artwork display dimensions:', artworkDisplay.offsetWidth, 'x', displayHeight);
      console.log('Image dimensions:', artworkImage.clientWidth, 'x', imageHeight);
      console.log('Image natural dimensions:', artworkImage.naturalWidth, 'x', naturalHeight);
      console.log('Image scale:', scale, 'Expected height:', expectedHeight);
      console.log('Image top offset:', artworkImage.offsetTop, 'Container padding:', getComputedStyle(artworkDisplay).padding);
      console.log('Top visible:', topVisible, 'Bottom visible:', bottomVisible, 'Overall visible:', artworkImage.offsetWidth > 0 && artworkImage.offsetHeight > 0);
    }

    // Add event listeners for dynamic adjustments
    window.addEventListener('resize', adjustArtworkHeightAndScale);
    window.addEventListener('load', adjustArtworkHeightAndScale);
    artworkImage.addEventListener('load', adjustArtworkHeightAndScale);

    // Typewriter effect function
    function typeWriter(element, text, speed = 100, callback) {
      element.textContent = '';
      let i = 0;
      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          typingTimeout = setTimeout(type, speed);
        } else if (callback) {
          callback();
        }
      }
      type();
    }

    // Stop ongoing typing animations
    function stopTyping() {
      if (typingTimeout) {
        clearTimeout(typingTimeout);
        typingTimeout = null;
      }
      [totalArtworks, artworkNumber, artworkTitle, artworkYear, artworkType].forEach(el => {
        el.textContent = '';
      });
    }

    // Show loading spinner
    function showSpinner() {
      loadingSpinner.style.display = 'block';
      artworkImage.style.display = 'none';
      artworkDisplay.innerHTML = '';
      artworkDisplay.appendChild(loadingSpinner);
      artworkDisplay.appendChild(artworkImage);
    }

    // Hide loading spinner
    function hideSpinner() {
      loadingSpinner.style.display = 'none';
      artworkImage.style.display = 'block';
    }

    // Update UI with current artwork
    function updateArtwork() {
      stopTyping();
      const currentArtwork = artworks[currentIndex];

      // Apply typewriter effect to total and artwork number first
      typeWriter(totalArtworks, `${artworks.length}`, 100);
      typeWriter(artworkNumber, `${currentIndex + 1}`, 100, () => {
        // Start typewriter effect for all metadata items simultaneously
        typeWriter(artworkTitle, currentArtwork.project || 'N/A', 100);
        typeWriter(artworkYear, currentArtwork.year || 'N/A', 100);
        typeWriter(artworkType, currentArtwork.type || 'N/A', 100);
      });

      // Set description text directly
      description.textContent = currentArtwork.description || 'No description available';
      hideSpinner();

      // Update image with fade-in
      const imageSrc = currentArtwork.imageurl || 'https://via.placeholder.com/300?text=No+Image';
      artworkImage.src = imageSrc;
      artworkImage.alt = currentArtwork.project || 'Artwork';

      // Reset and restart the fade-in animation
      artworkImage.style.animation = 'none'; // Clear the animation
      artworkImage.offsetHeight; // Trigger reflow to restart animation
      artworkImage.style.animation = 'fadeIn 0.5s ease-in forwards'; // Reapply the animation

      // Update arrow states
      if (currentIndex === 0) {
        arrowLeft.classList.add('disabled');
        arrowLeftWrapper.classList.add('disabled');
        hoverLeft.style.cursor = 'default';
      } else {
        arrowLeft.classList.remove('disabled');
        arrowLeftWrapper.classList.remove('disabled');
        hoverLeft.style.cursor = 'pointer';
      }
      if (currentIndex === artworks.length - 1) {
        arrowRight.classList.add('disabled');
        arrowRightWrapper.classList.add('disabled');
        hoverRight.style.cursor = 'default';
      } else {
        arrowRight.classList.remove('disabled');
        arrowRightWrapper.classList.remove('disabled');
        hoverRight.style.cursor = 'pointer';
      }

      // Adjust height and scale after image loads
      adjustArtworkHeightAndScale();
    }

    // Swipe functionality
    function swipeLeft() {
      if (currentIndex > 0) {
        currentIndex--;
        showSpinner();
        const img = new Image();
        img.src = artworks[currentIndex].imageurl || 'https://via.placeholder.com/300?text=No+Image';
        img.onload = updateArtwork;
        img.onerror = () => {
          console.error('Error loading image:', img.src);
          updateArtwork();
        };
      }
    }

    function swipeRight() {
      if (currentIndex < artworks.length - 1) {
        currentIndex++;
        showSpinner();
        const img = new Image();
        img.src = artworks[currentIndex].imageurl || 'https://via.placeholder.com/300?text=No+Image';
        img.onload = updateArtwork;
        img.onerror = () => {
          console.error('Error loading image:', img.src);
          updateArtwork();
        };
      }
    }

    // Add event listeners for arrows and hover areas
    arrowLeftWrapper.addEventListener('click', swipeLeft);
    arrowRightWrapper.addEventListener('click', swipeRight);
    hoverLeft.addEventListener('click', swipeLeft);
    hoverRight.addEventListener('click', swipeRight);

    // Fetch artworks from API
    async function fetchArtworks() {
      showSpinner();
      try {
        const response = await fetch('https://sitoform25.onrender.com/api/artworks');
        if (!response.ok) throw new Error('Failed to fetch artworks');
        artworks = await response.json();

        if (artworks.length === 0) {
          artworkDisplay.innerHTML = '<p>No artworks found.</p>';
          hideSpinner();
          return;
        }

        artworks = artworks.map((artwork, index) => ({
          number: index + 1,
          project: artwork.project,
          year: artwork.year,
          type: artwork.type,
          description: artwork.description,
          imageurl: artwork.imageurl
        }));

        totalArtworks.textContent = `${artworks.length}`;
        currentIndex = 0;
        updateArtwork();
      } catch (error) {
        console.error('Error fetching from API:', error);
        // Fallback to artworks.json
        try {
          const response = await fetch('https://sitoform.com/data/artworks.json');
          const fallbackData = await response.json();

          if (fallbackData.length === 0) {
            artworkDisplay.innerHTML = '<p>No artworks found (fallback).</p>';
            hideSpinner();
            return;
          }

          artworks = fallbackData.map((artwork, index) => ({
            number: index + 1,
            project: artwork.project,
            year: artwork.year,
            type: artwork.type,
            description: artwork.description,
            imageurl: artwork.imageurl
          }));

          totalArtworks.textContent = `${artworks.length}`;
          currentIndex = 0;
          updateArtwork();
        } catch (fallbackError) {
          console.error('Error fetching fallback artworks.json:', fallbackError);
          artworkDisplay.innerHTML = '<p>Error loading artworks.</p>';
          hideSpinner();
        }
      }
    }

    // Fetch and render artworks on page load
    fetchArtworks();
  </script>
</body>
</html>
